<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="stylesheet" href="./assets/css/layout.css" />
    <link rel="stylesheet" href="./assets/css/main.css" />
    <link rel="stylesheet" href="./assets/css/variables.css" />

    <link rel="stylesheet" href="./assets/components/header.css" />
    <link rel="stylesheet" href="./assets/components/hero.css" />
    <link rel="stylesheet" href="./assets/components/product-category.css" />
    <link rel="stylesheet" href="./assets/css/products-grid.css" />

    <title>SyntaxWear - Tênis e Sneakers Online</title>
  </head>
  <body>
    <header class="header">
      <h1 class="logo">
        <a href="/" title="SyntaxWear - Tênis e Sneakers Online">
          <img
            src="./assets/img/logo/logo-syntaxwear.svg"
            alt="SyntaxWear - Tênis e Sneakers Online"
          />
        </a>
      </h1>
      <nav class="nav-center" aria-label="Categorias Principais">
        <ul>
          <li><a href="#">Masculino</a></li>
          <li><a href="#">Feminino</a></li>
          <li><a href="#">Outlet</a></li>
        </ul>
      </nav>

      <nav class="nav-right" aria-label="Acesso rápido">
        <ul>
          <li><a href="#">Nossas lojas</a></li>
          <li><a href="#">Sobre</a></li>

          <li>
            <a href="#" aria-label="Minha conta">
              <img
                src="./assets/img/icons/ícone-person.png"
                alt="Minha conta"
              />
            </a>
          </li>

          <li>
            <a href="#" aria-label="Ajuda">
              <img src="./assets/img/icons/ícone-question.png" alt="Ajuda" />
            </a>
          </li>

          <li>
            <a href="#" aria-label="Carrinho">
              <img
                src="./assets/img/icons/ícone-bag.png"
                alt="Carrinho de compras"
              />
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero-section">
        <div class="hero-overlay">
          <div class="hero-content">
            <span class="hero-subtitle">Krypton One</span>
            <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
            <div class="hero-buttons">
              <a class="btn btn-outline" href="#">Ver modelos</a>
              <a class="btn btn-filled" href="#">Comprar </a>
            </div>
          </div>
        </div>
      </section>

      <section class="categories-section">
        <div class="category-card casual">
          <a href="#" class="category-link">
            <span class="overlay"></span>
            <span class="category-name btn btn-outline">Casual</span>
          </a>
        </div>

        <div class="category-card esporte">
          <a href="#" class="category-link">
            <span class="overlay"></span>
            <span class="category-name btn btn-outline">Esporte</span>
          </a>
        </div>

        <div class="category-card moderno">
          <a href="#" class="category-link">
            <span class="overlay"></span>
            <span class="category-name btn btn-outline">Moderno</span>
          </a>
        </div>

        <div class="category-card futurista">
          <a href="#" class="category-link">
            <span class="overlay"></span>
            <span class="category-name btn btn-outline">Futurista</span>
          </a>
        </div>
      </section>

      <section class="grid-section">
        <div class="card highlight">
          <div class="top1-content">
            <h3 class="card-title">Krypton One</h3>
            <p class="card-subtitle">Estilo Urbano</p>
            <div class="cta-grup">
              <a href="#" class="btn btn-outline">Feminino</a>
              <a href="#" class="btn btn-outline">Masculino</a>
            </div>
          </div>
        </div>
        <div class="card sneakers-purple"></div>
        <div class="card modeL"></div>
        <div class="card sneakers-color"></div>
        <div class="card sneakers-white"></div>
        <div class="card sneakers-silver"></div>
      </section>
    </main>

    <footer class="footer"></footer>
  </body>
</html>
